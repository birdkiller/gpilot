version: '3.8'

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15.10
    container_name: gpilot-postgres
    environment:
      POSTGRES_USER: gpilot
      POSTGRES_PASSWORD: gpilot
      POSTGRES_DB: gpilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.1
    container_name: gpilot-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- gPilot Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: gpilot-backend
    ports:
      - "8080:8080"
    volumes:
      # 用 Docker 专用配置覆盖默认配置
      - ./backend/config/config.docker.yaml:/app/config/config.yaml:ro
    environment:
      GPILOT_CONFIG: /app/config/config.yaml
      GPILOT_MIGRATIONS: /app/migrations
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- gPilot Frontend ---
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: gpilot-frontend
    ports:
      - "3000:80"
    volumes:
      # 挂载 nginx 配置
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
